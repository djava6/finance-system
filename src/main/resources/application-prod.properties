# ── Perfil de produção (GCP) ──────────────────────────────────────────────

# Habilita GCP e Secret Manager em produção
spring.cloud.gcp.core.enabled=true
spring.cloud.gcp.secretmanager.enabled=true
spring.config.import=sm://

# Banco via Secret Manager
spring.datasource.url=${sm://finance-db-url}
spring.datasource.username=${sm://finance-db-username}
spring.datasource.password=${sm://finance-db-password}

spring.jpa.show-sql=false

# HikariCP — conservador para db-f1-micro (máx 25 conexões)
# Com Cloud Run escalando: N instâncias × 5 = N×5 conexões (margem segura até 5 instâncias)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# Actuator — expõe apenas health check em produção (sem métricas sensíveis)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
