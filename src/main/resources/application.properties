firebase.project-id=${FIREBASE_PROJECT_ID:finance-app-4f54c}

# Desabilita autoconfigurações não utilizadas:
# - GcpFirestoreAutoConfiguration: firebase-admin traz google-cloud-firestore transitivamente,
#   mas não usamos Firestore via Spring Cloud GCP
# - UserDetailsServiceAutoConfiguration: auth é feita via Firebase, sem UserDetailsService
spring.autoconfigure.exclude=\
  com.google.cloud.spring.autoconfigure.firestore.GcpFirestoreAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info,metrics

# GCP — desabilitado fora do perfil de produção
spring.cloud.gcp.core.enabled=false
spring.cloud.gcp.secretmanager.enabled=false
