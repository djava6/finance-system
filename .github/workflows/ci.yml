name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'frontend/**'

jobs:

  # ─────────────────────────────────────
  # Job 1: Testes + Build do JAR
  # ─────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar -x test --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v7.0.0
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

  # ─────────────────────────────────────
  # Job 2: Build Image & Deploy (apenas main)
  # ─────────────────────────────────────
  deploy:
    name: Build Image & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy finance-system \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "SPRING_PROFILES_ACTIVE=prod,SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
            --service-account "finance-system-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --min-instances 0 \
            --memory 1Gi \
            --use-http2 \
            --project ${{ secrets.GCP_PROJECT_ID }}
