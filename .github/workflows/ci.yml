name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: us-central1
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────
  # Job 1: Testes
  # ─────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Java 21
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: test-report
          path: target/surefire-reports/

  # ─────────────────────────────────────
  # Job 2: Build & Deploy (apenas main)
  # ─────────────────────────────────────
  deploy:
    name: Build Image & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2.1.7
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2.1.4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:${{ github.sha }} \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:${{ github.sha }}
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy finance-system \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/finance-system/app:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "SPRING_PROFILES_ACTIVE=prod" \
            --service-account "finance-system-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --project ${{ secrets.GCP_PROJECT_ID }}

  # ─────────────────────────────────────
  # Job 3: Flutter Web (apenas main)
  # ─────────────────────────────────────
  deploy-frontend:
    name: Build Flutter Web & Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'
          cache: true

      - name: Flutter build web
        working-directory: frontend
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=API_URL=https://finance-system-zv4dye6hcq-uc.a.run.app

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy --only hosting \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive