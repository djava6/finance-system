name: Rotate JWT Secret

on:
  schedule:
    # Executa todo dia 1 de cada mês às 03:00 UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  rotate-jwt-secret:
    name: Rotate JWT Secret in Secret Manager
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2.1.7
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2.1.4

      - name: Generate new JWT secret
        id: generate
        run: |
          NEW_SECRET=$(openssl rand -base64 48)
          echo "::add-mask::$NEW_SECRET"
          echo "new_secret=$NEW_SECRET" >> $GITHUB_OUTPUT

      - name: Add new version to Secret Manager
        run: |
          echo -n "${{ steps.generate.outputs.new_secret }}" | \
            gcloud secrets versions add finance-jwt-secret \
              --data-file=- \
              --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Redeploy Cloud Run to pick up new secret
        run: |
          gcloud run services update finance-system \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --no-traffic

          gcloud run services update-traffic finance-system \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --to-latest

      - name: Disable old secret versions (keep last 2)
        run: |
          gcloud secrets versions list finance-jwt-secret \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --filter="state=ENABLED" \
            --sort-by="~createTime" \
            --format="value(name)" | tail -n +3 | \
          while read version; do
            gcloud secrets versions disable "$version" \
              --secret=finance-jwt-secret \
              --project=${{ secrets.GCP_PROJECT_ID }}
            echo "Disabled: $version"
          done
