name: Deploy Billing Alert Function

on:
  push:
    branches: [main]
    paths:
      - "billing-alert-function/**"
  workflow_dispatch:

env:
  PROJECT_ID: finance-app-489504
  REGION: us-central1
  FUNCTION_NAME: billing-alert-function

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Build JAR
        working-directory: billing-alert-function
        run: ./gradlew shadowJar

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Cloud Function
        uses: google-github-actions/deploy-cloud-functions@v3
        with:
          name: ${{ env.FUNCTION_NAME }}
          runtime: java21
          region: ${{ env.REGION }}
          source_dir: billing-alert-function
          entry_point: br.com.useinet.finance.BillingAlertFunction
          event_trigger_type: google.pubsub.topic.publish
          event_trigger_resource: projects/${{ env.PROJECT_ID }}/topics/billing-alerts
          service_account: finance-system-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          environment_variables: |-
            INSTANCE_CONNECTION_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:finance-db
