name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:

  # ─────────────────────────────────────
  # Job 1: Flutter build (valida PR)
  # ─────────────────────────────────────
  build:
    name: Flutter Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'
          cache: true

      - name: Flutter build web
        working-directory: frontend
        run: |
          flutter pub get
          flutter build web --release \
            --no-wasm-dry-run \
            --dart-define=API_URL=https://finance-system-zv4dye6hcq-uc.a.run.app

  # ─────────────────────────────────────
  # Job 2: Deploy (apenas main)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'
          cache: true

      - name: Flutter build web
        working-directory: frontend
        run: |
          flutter pub get
          flutter build web --release \
            --no-wasm-dry-run \
            --dart-define=API_URL=https://finance-system-zv4dye6hcq-uc.a.run.app

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy --only hosting \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive
