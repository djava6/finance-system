name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────
  # Job 1: Widget tests
  # ─────────────────────────────────────
  test:
    name: Flutter Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'
          cache: true

      - name: Run widget tests
        working-directory: frontend
        run: |
          flutter pub get
          flutter test test/ --reporter json > test-results.json 2>test-errors.txt || (cat test-errors.txt && exit 1)

      - name: Publicar resumo no Summary
        if: always()
        working-directory: frontend
        run: |
          passed=$(grep -o '"result":"success"' test-results.json | wc -l | tr -d ' ')
          failed=$(grep -o '"result":"error"' test-results.json | wc -l | tr -d ' ')
          total=$((passed + failed))
          echo "## 🧪 Testes Frontend (Widget)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Quantidade |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passaram | $passed |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Falharam | $failed |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Total | $total |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$failed" -gt 0 ]; then
            echo "### Falhas" >> $GITHUB_STEP_SUMMARY
            grep -o '"name":"[^"]*","result":"error"' test-results.json | \
              sed 's/"name":"//;s/","result":"error"//' | \
              while read t; do echo "- ❌ $t" >> $GITHUB_STEP_SUMMARY; done
          fi

  # ─────────────────────────────────────
  # Job 2: Flutter build (valida PR)
  # ─────────────────────────────────────
  build:
    name: Flutter Build Web
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'
          cache: true

      - name: Flutter build web
        working-directory: frontend
        run: |
          flutter pub get
          flutter build web --release \
            --no-wasm-dry-run \
            --dart-define=API_URL=https://finance-system-zv4dye6hcq-uc.a.run.app

  # ─────────────────────────────────────
  # Job 3: Deploy (apenas main)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'
          cache: true

      - name: Flutter build web
        working-directory: frontend
        run: |
          flutter pub get
          flutter build web --release \
            --no-wasm-dry-run \
            --dart-define=API_URL=https://finance-system-zv4dye6hcq-uc.a.run.app

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy --only hosting \
            --token ${{ secrets.FIREBASE_TOKEN }} \
            --non-interactive
