name: Atualizar Roadmap (#78)

on:
  pull_request:
    types: [opened, reopened]
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  marcar-em-progresso:
    name: Marcar em progresso no roadmap
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || "";
            const closes = [...body.matchAll(/(?:closes|fixes|resolves)\s+#(\d+)/gi)]
              .map(m => parseInt(m[1]));

            if (closes.length === 0) return;

            const { data: roadmap } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 78
            });

            let body78 = roadmap.body;
            let updated = false;

            for (const issueNum of closes) {
              if (issueNum === 78) continue;
              const pattern = new RegExp(`- \\[[ ]\\] #${issueNum}\\b`);
              if (!pattern.test(body78)) continue;
              body78 = body78.replace(pattern, `- [ ] 🔄 #${issueNum}`);
              updated = true;
              console.log(`🔄 #${issueNum} marcada como em progresso no roadmap`);
            }

            if (!updated) return;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 78,
              body: body78
            });

  marcar-concluido:
    name: Marcar concluído no roadmap
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNum = context.payload.issue.number;
            if (issueNum === 78) return;

            const { data: roadmap } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 78
            });

            let body = roadmap.body;
            // Casa "- [ ] #N" com ou sem emoji/prefixo entre o checkbox e o #
            const pattern = new RegExp(`- \\[ \\][^#]*#${issueNum}\\b`);
            if (!pattern.test(body)) return;

            body = body.replace(pattern, `- [x] #${issueNum}`);

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 78,
              body
            });

            console.log(`✅ #${issueNum} marcada como concluída no roadmap`);
